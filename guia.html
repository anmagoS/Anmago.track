<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Envío - Expres Contraentrega</title>
    <!-- Código de barras library -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="guia.css">
    <script>
        // VERIFICACIÓN DE AUTENTICACIÓN
        (function() {
            const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
            
            if (!usuario) {
                console.log("❌ No autorizado para ver guías");
                window.location.replace("login.html");
                return;
            }
            
            console.log("✅ Usuario autorizado para guías:", usuario.USUARIO);
        })();
    </script>
</head>
<body>
    <!-- Controles solo para pantalla -->
    <div class="screen-controls">
        <button onclick="window.print()" class="btn-print">🖨️ Imprimir Media Carta</button>
        <button onclick="window.close()" class="btn-close">✖️ Cerrar</button>
        <button onclick="debugGuia()" class="btn-debug">🐛 Debug</button>
        <div class="print-instructions">
            <strong>IMPRESIÓN:</strong> Hoja CARTA completa, contenido en MITAD SUPERIOR • Cortar por línea punteada
        </div>
    </div>

    <!-- CONTENEDOR PARA PANTALLA (solo visualización) -->
    <div class="media-carta-screen" id="mediaCartaScreen">
        <div class="corte-vertical"></div>
    </div>

    <!-- CONTENEDOR PARA IMPRESIÓN (oculto en pantalla) -->
    <div class="media-carta-print" id="mediaCartaPrint">
        <div class="corte-vertical"></div>
        <div class="corte-horizontal">✄ CORTAR POR ESTA LÍNEA ✄</div>
    </div>

    <script>
    // ===== CONFIGURACIÓN =====
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxIipuPmVAvaTt7_oUQzMLNtXIah19dcq2CWkaoglQvFivqY-wBYEw64tvUmL4-1k62/exec";
    
    // ===== CARGAR DATOS DEL ENVÍO =====
    async function cargarDatosGuia() {
        try {
            const envioId = localStorage.getItem('envioParaGuia');
            
            if (!envioId) {
                alert('No hay envío seleccionado para generar guía');
                window.close();
                return null;
            }
            
            console.log('🔍 Cargando datos del envío:', envioId);
            
            const url = `${WEB_APP_URL}?action=obtenerGuia&id=${encodeURIComponent(envioId)}`;
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`Error HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.success && data.encontrado) {
                console.log('✅ Datos del envío cargados');
                return data;
            } else {
                alert('No se encontró el envío');
                window.close();
                return null;
            }
            
        } catch (error) {
            console.error('❌ Error cargando datos:', error);
            alert('Error al cargar datos del envío');
            window.close();
            return null;
        }
    }
    
    // ===== ACORTAR TEXTO PARA CABER =====
    function acortarTexto(texto, maxLength = 60) {
        if (!texto) return '';
        if (texto === 'Ninguno' || texto === 'N/A') return '';
        if (texto.length <= maxLength) return texto;
        return texto.substring(0, maxLength - 3) + '...';
    }
    
    // ===== GENERAR UNA GUÍA INDIVIDUAL =====
    function generarGuiaHTML(envio, tipo = 'remitente') {
        // Formatear valores
        const valorRecaudar = parseFloat(envio['VALOR A RECAUDAR'] || 0);
        const valorFormateado = new Intl.NumberFormat('es-CO', {
            style: 'currency',
            currency: 'COP',
            minimumFractionDigits: 0
        }).format(valorRecaudar);
        
        const fecha = new Date(envio['FECHA DE CREACION'] || new Date());
        const fechaFormateada = fecha.toLocaleDateString('es-CO', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        });
        
        const claseTipo = tipo === 'remitente' ? 'remitente' : 'paquete';
        const textoEtiqueta = tipo === 'remitente' ? 'REMITENTE' : 'PAQUETE';
        
        // Acortar textos (límites más generosos)
        const direccion = acortarTexto(envio['DIRECCION DESTINO'] || '', 70);
        const complemento = acortarTexto(envio['COMPLEMENTO DE DIR'] || '', 50);
        const observaciones = acortarTexto(envio['OBS'] || '', 60);
        const barrio = acortarTexto(envio['BARRIO'] || '', 55);
        const remitente = acortarTexto(envio['REMITE'] || '', 45);
        const destinatario = acortarTexto(envio['DESTINO'] || '', 45);
        const direccionRemitente = acortarTexto(envio['DIRECCION'] || envio['DIRECCION REMITENTE'] || '', 50);
        
        return `
            <div class="guia-container">
                <div class="etiqueta-tipo ${claseTipo}">${textoEtiqueta}</div>
                
                <header class="guia-header">
                    <div class="logo-section">
                        <div class="logo">🚚</div>
                        <div class="empresa-info">
                            <h1>ANMAGO TRACK</h1>
                            <p class="slogan">Tu envío rápido y seguro</p>
                        </div>
                    </div>
                    
                    <div class="guia-info">
                        <div class="info-row">
                            <span class="label">GUÍA:</span>
                            <span class="value guia-id">${envio['ENVIO ID'] || 'N/A'}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">PAGO:</span>
                            <span class="value">${envio['FORMA DE PAGO'] || 'N/A'}</span>
                        </div>
                    </div>
                </header>

                <div class="divider"></div>

                <div class="codigo-barras-section">
                    <svg class="codigo-barras" data-guia-id="${envio['ENVIO ID'] || ''}"></svg>
                    <div class="numero-guia-barras">${envio['ENVIO ID'] || 'N/A'}</div>
                </div>

                <div class="divider thin"></div>

                <!-- SECCIÓN REMITENTE -->
                <section class="seccion remitente">
                    <h2 class="seccion-title">📍 REMITENTE</h2>
                    <div class="datos">
                        <div class="dato-line">
                            <strong class="texto-wrap">${remitente}</strong>
                        </div>
                        <div class="dato-line">
                            <span class="label">Tel:</span>
                            <span class="texto-wrap">${envio['TELEFONO'] || 'N/A'}</span>
                        </div>
                        <div class="dato-line">
                            <span class="label">Dir:</span>
                            <span class="texto-wrap">${direccionRemitente}</span>
                        </div>
                        <div class="dato-line">
                            <span class="label">Ciudad:</span>
                            <span class="texto-wrap">${envio['CIUDAD'] || 'Bogotá D.C.'}</span>
                        </div>
                    </div>
                </section>

                <div class="divider"></div>

                <!-- SECCIÓN DESTINATARIO -->
                <section class="seccion destinatario">
                    <h2 class="seccion-title">👤 DESTINATARIO</h2>
                    <div class="datos">
                        <div class="dato-line">
                            <strong class="texto-wrap">${destinatario}</strong>
                        </div>
                        <div class="dato-line">
                            <span class="label">Tel:</span>
                            <span class="texto-wrap">${envio['TELEFONOCLIENTE'] || 'N/A'}</span>
                        </div>
                        <div class="dato-line">
                            <span class="label">Dir:</span>
                            <span class="texto-wrap">${direccion}</span>
                        </div>
                        ${complemento ? `
                        <div class="dato-line">
                            <span class="label">Comp:</span>
                            <span class="texto-wrap complemento-texto">${complemento}</span>
                        </div>
                        ` : ''}
                        <div class="dato-line">
                            <span class="label">Barrio:</span>
                            <span class="texto-wrap barrio-texto">${barrio}</span>
                        </div>
                        <div class="dato-line">
                            <span class="label">Ciudad:</span>
                            <span class="texto-wrap">${envio['CIUDAD DESTINO'] || 'Bogotá D.C.'}</span>
                        </div>
                    </div>
                </section>

                <div class="divider"></div>

                <!-- SECCIÓN PAGO -->
                <section class="seccion pago">
                    <h2 class="seccion-title">💰 INFORMACIÓN DE PAGO</h2>
                    <div class="datos-pago">
                        <div class="pago-row">
                            <span class="label">Valor a Recaudar:</span>
                            <span class="value valor">${valorFormateado}</span>
                        </div>
                    </div>
                </section>

                <div class="divider"></div>

                <!-- SECCIÓN OBSERVACIONES -->
                <section class="seccion observaciones">
                    <h2 class="seccion-title">📝 OBSERVACIONES</h2>
                    <div class="observaciones-content texto-wrap">
                        ${observaciones || 'Sin observaciones'}
                    </div>
                </section>

                <footer class="guia-footer">
                    <div class="footer-line">
                        <span class="small">📞 Soporte: 3006498710</span>
                        <span class="small">🌐 anmagos.github.io/Anmago.track</span>
                    </div>
                    <div class="footer-line">
                        <span class="small">CARRERA 13 N° 9-39 OFC 1023</span>
                        <span class="small">Fecha: ${fechaFormateada}</span>
                    </div>
                </footer>
            </div>
        `;
    }
    
    // ===== GENERAR CÓDIGO DE BARRAS =====
    function generarCodigosBarras() {
        document.querySelectorAll('.codigo-barras').forEach(svg => {
            const guiaId = svg.getAttribute('data-guia-id');
            if (guiaId && JsBarcode) {
                try {
                    JsBarcode(svg, guiaId, {
                        format: "CODE128",
                        width: 1.2,
                        height: 25,
                        displayValue: false,
                        margin: 5
                    });
                } catch (error) {
                    console.error('Error generando código de barras:', error);
                }
            }
        });
    }
    
    // ===== INICIALIZAR =====
    async function inicializarGuia() {
        try {
            const datos = await cargarDatosGuia();
            
            if (!datos) return;
            
            const envio = datos;
            const containerScreen = document.getElementById('mediaCartaScreen');
            const containerPrint = document.getElementById('mediaCartaPrint');
            
            const guiaRemitente = generarGuiaHTML(envio, 'remitente');
            const guiaPaquete = generarGuiaHTML(envio, 'paquete');
            
            containerScreen.insertAdjacentHTML('beforeend', guiaRemitente);
            containerScreen.insertAdjacentHTML('beforeend', guiaPaquete);
            
            containerPrint.insertAdjacentHTML('beforeend', guiaRemitente);
            containerPrint.insertAdjacentHTML('beforeend', guiaPaquete);
            
            setTimeout(generarCodigosBarras, 100);
            
            console.log('✅ Guías generadas correctamente');
            
        } catch (error) {
            console.error('❌ Error:', error);
            alert('Error al generar la guía');
        }
    }
    
    // ===== DEBUG =====
    function debugGuia() {
        const container = document.querySelector('.media-carta-screen');
        console.log('=== DEBUG ===');
        console.log('Tamaño:', container.offsetWidth + 'x' + container.offsetHeight + 'px');
        
        const barrioElem = document.querySelector('#mediaCartaScreen .destinatario .dato-line:nth-child(6) span:last-child');
        if (barrioElem) {
            console.log('Barrio mostrado:', barrioElem.textContent);
            console.log('Estilo white-space:', getComputedStyle(barrioElem).whiteSpace);
        }
        
        alert('Ver consola para información detallada');
    }
    
    document.addEventListener('DOMContentLoaded', inicializarGuia);
    </script>
</body>
</html>
