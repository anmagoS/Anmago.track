<!DOCTYPE html>
<html>
<head>
    <title>📸 Captura Rótulo - Mensajeros</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
        }
        
        input[type="tel"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="tel"]:focus {
            border-color: #0088cc;
            outline: none;
        }
        
        .file-input {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .file-input:hover {
            border-color: #0088cc;
        }
        
        .preview {
            margin-top: 10px;
            text-align: center;
        }
        
        .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            display: none;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #006699;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .estado {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .estado.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .estado.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .id-generado {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            color: #0088cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 Capturar Rótulo</h2>
        
        <div class="id-generado" id="idGenerado">
            Generando ID...
        </div>
        
        <div class="form-group">
            <label>📞 Teléfono del Cliente (a quien notificar)</label>
            <input type="tel" id="telefonoCliente" placeholder="Ej: 573001234567" maxlength="13">
            <small style="color: #666;">Incluye código de país: 57 para Colombia</small>
        </div>
        
        <div class="form-group">
            <label>📸 Foto del Rótulo</label>
            <div class="file-input" onclick="document.getElementById('foto').click()">
                <span>Haz clic para tomar foto</span>
                <input type="file" id="foto" accept="image/*" capture="environment" style="display: none;">
            </div>
            <div class="preview">
                <img id="preview" src="#" alt="Vista previa">
            </div>
        </div>
        
        <button onclick="enviarCaptura()" id="btnEnviar">📤 Enviar y Notificar</button>
        
        <div id="estado" class="estado"></div>
    </div>

    <script>
        // Configuración - ¡CAMBIA ESTOS VALORES!
        const CONFIG = {
            TELEGRAM_BOT_TOKEN: 'TU_TOKEN_DEL_BOT', // El que ya tienes
            TELEGRAM_GRUPO_ID: 'TU_GRUPO_ID', // Donde guardas tu copia
            PREFIJO_ID: 'ENV'
        };
        
        // Elementos del DOM
        const telefonoInput = document.getElementById('telefonoCliente');
        const fotoInput = document.getElementById('foto');
        const previewImg = document.getElementById('preview');
        const idGeneradoDiv = document.getElementById('idGenerado');
        const btnEnviar = document.getElementById('btnEnviar');
        const estadoDiv = document.getElementById('estado');
        
        // Vista previa de la foto
        fotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Generar ID único (mismo formato que ya tienes)
        function generarID() {
            const fecha = new Date();
            
            // Ajuste a hora Bogotá (UTC-5)
            fecha.setHours(fecha.getHours() - 5);
            
            const año = fecha.getFullYear().toString().slice(-2);
            const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
            const dia = fecha.getDate().toString().padStart(2, '0');
            const hora = fecha.getHours().toString().padStart(2, '0');
            const minutos = fecha.getMinutes().toString().padStart(2, '0');
            const segundos = fecha.getSeconds().toString().padStart(2, '0');
            
            // ID: ENV + AÑO + MES + DÍA + HORA + MINUTOS + SEGUNDOS
            const id = `${CONFIG.PREFIJO_ID}${año}${mes}${dia}${hora}${minutos}${segundos}`;
            
            idGeneradoDiv.textContent = `🆔 ID: ${id}`;
            return id;
        }
        
        // Generar ID al cargar la página
        window.addEventListener('load', generarID);
        
        // Función principal - ¡AHORA HACE DOS COSAS!
        async function enviarCaptura() {
            // Validar campos
            const telefono = telefonoInput.value.trim();
            const foto = fotoInput.files[0];
            const idGuia = generarID(); // Generar ID actualizado
            
            if (!telefono) {
                mostrarEstado('⚠️ Ingresa el teléfono del cliente', 'error');
                return;
            }
            
            if (!foto) {
                mostrarEstado('⚠️ Toma la foto del rótulo', 'error');
                return;
            }
            
            // Validar formato teléfono Colombia
            if (!telefono.startsWith('57') || telefono.length < 12) {
                mostrarEstado('⚠️ El teléfono debe comenzar con 57 (Ej: 573001234567)', 'error');
                return;
            }
            
            // Deshabilitar botón
            btnEnviar.disabled = true;
            btnEnviar.textContent = '⏫ Procesando...';
            mostrarEstado('📤 Enviando copia a Telegram y preparando WhatsApp...', 'success');
            
            try {
                // ============================================
                // ACCIÓN 1: ENVIAR A TELEGRAM (TU COPIA)
                // ============================================
                const telegramPromise = enviarATelegram(foto, idGuia, telefono);
                
                // ============================================
                // ACCIÓN 2: ENVIAR A WHATSAPP CON IMAGEN ADJUNTA
                // ============================================
                const whatsappPromise = enviarWhatsAppConImagen(foto, idGuia, telefono);
                
                // Esperar a que ambas acciones se completen
                await Promise.all([telegramPromise, whatsappPromise]);
                
                mostrarEstado('✅ ¡Listo! Imagen enviada a WhatsApp y copia guardada en Telegram', 'success');
                
                // Limpiar formulario
                setTimeout(() => {
                    telefonoInput.value = '';
                    fotoInput.value = '';
                    previewImg.style.display = 'none';
                    generarID(); // Generar nuevo ID
                    btnEnviar.disabled = false;
                    btnEnviar.textContent = '📤 Enviar y Notificar';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                mostrarEstado(`❌ Error: ${error.message}`, 'error');
                btnEnviar.disabled = false;
                btnEnviar.textContent = '📤 Enviar y Notificar';
            }
        }
        
        // ============================================
        // FUNCIÓN 1: ENVIAR A TELEGRAM (TU COPIA DE SEGURIDAD)
        // ============================================
        async function enviarATelegram(foto, idGuia, telefono) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = async function(e) {
                    try {
                        const formData = new FormData();
                        formData.append('chat_id', CONFIG.TELEGRAM_GRUPO_ID);
                        formData.append('photo', foto);
                        
                        const fecha = new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' });
                        const caption = `📦 *NUEVA CAPTURA*\n━━━━━━━━━━━━━━\n🆔 ID: ${idGuia}\n📞 Teléfono: ${telefono}\n📅 Fecha: ${fecha}\n━━━━━━━━━━━━━━`;
                        
                        formData.append('caption', caption);
                        formData.append('parse_mode', 'Markdown');
                        
                        const response = await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await response.json();
                        
                        if (data.ok) {
                            console.log('✅ Imagen guardada en Telegram');
                            resolve(true);
                        } else {
                            console.warn('⚠️ Error en Telegram:', data.description);
                            // No rejecteamos para que no falle todo si Telegram falla
                            resolve(false);
                        }
                        
                    } catch (error) {
                        console.warn('⚠️ Error enviando a Telegram:', error);
                        resolve(false); // Continuamos aunque falle Telegram
                    }
                };
                
                reader.onerror = () => {
                    console.warn('⚠️ Error leyendo imagen para Telegram');
                    resolve(false);
                };
                
                reader.readAsDataURL(foto);
            });
        }
        
        // ============================================
        // FUNCIÓN 2: ENVIAR A WHATSAPP CON IMAGEN ADJUNTA
        // ============================================
        async function enviarWhatsAppConImagen(foto, idGuia, telefono) {
            return new Promise(async (resolve, reject) => {
                try {
                    // Verificar si el navegador soporta Web Share
                    if (navigator.canShare && navigator.share) {
                        // Crear archivo para compartir
                        const file = new File([foto], `guia-${idGuia}.jpg`, {
                            type: foto.type || 'image/jpeg'
                        });
                        
                        const shareData = {
                            title: `Guía ${idGuia}`,
                            text: `📦 Guía ${idGuia} - Rótulo del envío`,
                            files: [file]
                        };
                        
                        // Verificar si podemos compartir la imagen
                        if (navigator.canShare(shareData)) {
                            await navigator.share(shareData);
                            console.log('✅ Imagen compartida por WhatsApp');
                            resolve(true);
                            return;
                        }
                    }
                    
                    // Si no soporta Web Share, usamos fallback con imgbb
                    await fallbackWhatsAppConLink(foto, idGuia, telefono);
                    resolve(true);
                    
                } catch (error) {
                    // Si el usuario cancela el compartir, no es error
                    if (error.name === 'AbortError' || error.message.includes('cancel')) {
                        console.log('👆 El usuario canceló el compartir');
                        resolve(false);
                    } else {
                        // Si hay otro error, usamos fallback
                        console.warn('⚠️ Error en Web Share, usando fallback:', error);
                        await fallbackWhatsAppConLink(foto, idGuia, telefono);
                        resolve(true);
                    }
                }
            });
        }
        
        // ============================================
        // FALLBACK: Si no se puede adjuntar, usar imgbb
        // ============================================
        async function fallbackWhatsAppConLink(foto, idGuia, telefono) {
            try {
                // Subir a imgbb (gratis)
                const formData = new FormData();
                formData.append('image', foto);
                
                // IMPORTANTE: Regístrate gratis en imgbb.com y obtén tu API key
                const API_KEY = 'TU_API_KEY_DE_IMGBB'; // Reemplazar con tu API key
                
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.success) {
                    const urlImagen = data.data.url;
                    const mensaje = `📦 *Guía ${idGuia}*\n📸 *Imagen del envío:*\n${urlImagen}\n\n_Haga clic en el link para ver la imagen_`;
                    
                    window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
                } else {
                    // Si imgbb falla, enviar solo texto
                    const mensaje = `📦 *Guía ${idGuia}*\nLa imagen está disponible en el grupo de Telegram`;
                    window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
                }
                
            } catch (error) {
                console.warn('⚠️ Error en fallback:', error);
                // Último recurso: solo texto
                const mensaje = `📦 *Guía ${idGuia}*\nComunícate con la empresa para ver la imagen`;
                window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
            }
        }
        
        // Función para mostrar estado
        function mostrarEstado(mensaje, tipo) {
            estadoDiv.textContent = mensaje;
            estadoDiv.className = `estado ${tipo}`;
        }
        
        // Permitir enter en el input
        telefonoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enviarCaptura();
            }
        });
    </script>
</body>
</html>
