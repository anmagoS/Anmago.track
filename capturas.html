<!DOCTYPE html>
<html>
<head>
    <title>📸 Captura Múltiple - Mensajeros</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
        }
        
        input[type="tel"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="tel"]:focus {
            border-color: #0088cc;
            outline: none;
        }
        
        .file-input {
            border: 2px dashed #0088cc;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f8ff;
            margin-bottom: 20px;
        }
        
        .file-input:hover {
            background: #e3f2fd;
            border-color: #006699;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            border: 2px solid #eee;
            border-radius: 10px;
        }
        
        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            background: white;
        }
        
        .preview-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .preview-item .id-preview {
            font-size: 11px;
            font-weight: bold;
            color: #0088cc;
            margin: 5px 0;
            text-align: center;
            word-break: break-all;
        }
        
        .preview-item .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .preview-item .remove-btn:hover {
            background: #d32f2f;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-enviar {
            background: #25D366;
            color: white;
        }
        
        .btn-enviar:hover {
            background: #128C7E;
        }
        
        .btn-limpiar {
            background: #f44336;
            color: white;
        }
        
        .btn-limpiar:hover {
            background: #d32f2f;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .estado {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .estado.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .estado.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .telefono-guardado {
            background: #fff3cd;
            color: #856404;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            font-size: 12px;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 Captura Múltiple de Rótulos</h2>
        
        <div class="form-group">
            <label>📞 Teléfono del Cliente (10 dígitos)</label>
            <input type="tel" id="telefonoCliente" placeholder="Ej: 3001234567" maxlength="10" inputmode="numeric">
            <small style="color: #666;">Solo 10 dígitos, sin 57 ni espacios</small>
            <div id="telefonoGuardadoMsg" class="telefono-guardado"></div>
        </div>
        
        <div class="file-input" onclick="document.getElementById('fotos').click()">
            <span>➕ Haz clic para agregar fotos (puedes seleccionar varias)</span>
            <input type="file" id="fotos" accept="image/*" capture="environment" multiple style="display: none;">
        </div>
        
        <div class="stats">
            <span>📸 Fotos: <span id="totalFotos">0</span></span>
            <span>🆔 Último ID: <span id="ultimoID">-</span></span>
        </div>
        
        <div id="previewContainer" class="preview-grid"></div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="button-group">
            <button onclick="finalizarEnvio()" class="btn-enviar" id="btnFinalizar">
                📲 FINALIZAR Y ENVIAR
            </button>
            <button onclick="limpiarTodo()" class="btn-limpiar" id="btnLimpiar">
                🗑️ LIMPIAR TODO
            </button>
        </div>
        
        <div id="estado" class="estado"></div>
    </div>

    <script>
        const CONFIG = {
            TELEGRAM_BOT_TOKEN: '8320682242:AAG4h89_8WVmljeEvYHjzRxmnJDt-HoxcAY',
            TELEGRAM_GRUPO_ID: '-1003710352002',
            PREFIJO_ID: 'ENV'
        };
        
        // Array para almacenar las fotos
        let fotosArray = [];
        
        // Elementos DOM
        const telefonoInput = document.getElementById('telefonoCliente');
        const fotosInput = document.getElementById('fotos');
        const previewContainer = document.getElementById('previewContainer');
        const totalFotosSpan = document.getElementById('totalFotos');
        const ultimoIDSpan = document.getElementById('ultimoID');
        const btnFinalizar = document.getElementById('btnFinalizar');
        const estadoDiv = document.getElementById('estado');
        const telefonoGuardadoMsg = document.getElementById('telefonoGuardadoMsg');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        // Generar ID único
        function generarID() {
            const fecha = new Date();
            
            const formatter = new Intl.DateTimeFormat('es-CO', {
                timeZone: 'America/Bogota',
                year: '2-digit',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            
            const partes = formatter.formatToParts(fecha);
            
            let año, mes, dia, hora, minuto, segundo;
            
            partes.forEach(part => {
                if (part.type === 'year') año = part.value;
                if (part.type === 'month') mes = part.value;
                if (part.type === 'day') dia = part.value;
                if (part.type === 'hour') hora = part.value;
                if (part.type === 'minute') minuto = part.value;
                if (part.type === 'second') segundo = part.value;
            });
            
            return `${CONFIG.PREFIJO_ID}${año}${mes}${dia}${hora}${minuto}${segundo}`;
        }
        
        // Obtener fecha formateada
        function obtenerFechaHoraColombia() {
            const fecha = new Date();
            
            const opciones = {
                timeZone: 'America/Bogota',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true,
                timeZoneName: 'short'
            };
            
            return fecha.toLocaleString('es-CO', opciones).replace(',', '');
        }
        
        // Agregar fotos
        fotosInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            
            for (const file of files) {
                const id = generarID();
                
                const reader = new FileReader();
                const imageUrl = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                
                fotosArray.push({
                    file: file,
                    id: id,
                    preview: imageUrl
                });
            }
            
            actualizarPreview();
            fotosInput.value = '';
        });
        
        // Actualizar vista previa
        function actualizarPreview() {
            previewContainer.innerHTML = '';
            
            fotosArray.forEach((foto, index) => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                
                item.innerHTML = `
                    <img src="${foto.preview}" alt="Preview">
                    <div class="id-preview">${foto.id}</div>
                    <button class="remove-btn" onclick="eliminarFoto(${index})">×</button>
                `;
                
                previewContainer.appendChild(item);
            });
            
            totalFotosSpan.textContent = fotosArray.length;
            if (fotosArray.length > 0) {
                ultimoIDSpan.textContent = fotosArray[fotosArray.length - 1].id;
            } else {
                ultimoIDSpan.textContent = '-';
            }
        }
        
        // Eliminar foto
        function eliminarFoto(index) {
            fotosArray.splice(index, 1);
            actualizarPreview();
        }
        
        // Limpiar TODO (incluye teléfono y localStorage)
        function limpiarTodo() {
            if (fotosArray.length > 0 && !confirm('¿Eliminar todas las fotos y limpiar el teléfono?')) {
                return;
            }
            
            // Limpiar array de fotos
            fotosArray = [];
            
            // Limpiar campo de teléfono
            telefonoInput.value = '';
            
            // Limpiar localStorage
            localStorage.removeItem('ultimoTelefono');
            
            // Ocultar mensaje de teléfono guardado
            telefonoGuardadoMsg.style.display = 'none';
            
            // Actualizar vista
            actualizarPreview();
            
            mostrarEstado('🧹 Todo limpiado: fotos y teléfono', 'success');
        }
        
        // Función principal - FINALIZAR Y ENVIAR
        async function finalizarEnvio() {
            // Validaciones
            const telefono = telefonoInput.value.trim();
            
            if (!telefono) {
                mostrarEstado('⚠️ Ingresa el teléfono del cliente', 'error');
                return;
            }
            
            if (!/^\d{10}$/.test(telefono)) {
                mostrarEstado('⚠️ Teléfono debe tener 10 dígitos', 'error');
                return;
            }
            
            if (fotosArray.length === 0) {
                mostrarEstado('⚠️ No hay fotos para enviar', 'error');
                return;
            }
            
            // Confirmar
            if (!confirm(`¿Finalizar envío de ${fotosArray.length} paquete(s)?`)) {
                return;
            }
            
            // Deshabilitar botón
            btnFinalizar.disabled = true;
            btnFinalizar.textContent = '⏫ PROCESANDO...';
            progressBar.style.display = 'block';
            
            // Guardar teléfono para futuros envíos del MISMO cliente
            localStorage.setItem('ultimoTelefono', telefono);
            telefonoGuardadoMsg.textContent = `📌 Teléfono guardado: ${telefono}`;
            telefonoGuardadoMsg.style.display = 'block';
            
            const fechaHora = obtenerFechaHoraColombia();
            let enviadas = 0;
            let errores = 0;
            
            // ============================================
            // PASO 1: ENVIAR CADA FOTO A TELEGRAM
            // ============================================
            for (let i = 0; i < fotosArray.length; i++) {
                const foto = fotosArray[i];
                
                // Actualizar progreso
                const progreso = ((i + 1) / fotosArray.length) * 100;
                progressFill.style.width = progreso + '%';
                
                try {
                    await enviarATelegram(foto.file, foto.id, telefono, fechaHora);
                    enviadas++;
                } catch (error) {
                    console.error('Error:', error);
                    errores++;
                }
                
                // Pequeña pausa para no saturar la API
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            // ============================================
            // PASO 2: ENVIAR WHATSAPP (UNA VEZ CON TODOS LOS IDS)
            // ============================================
            const ids = fotosArray.map(f => f.id).join(', ');
            const telefonoCompleto = '57' + telefono;
            
            const mensaje = `📦 *ENVÍOS REGISTRADOS*\n` +
                           `━━━━━━━━━━━━━━━━━━\n` +
                           `📞 *Cliente:* ${telefono}\n` +
                           `📅 *Fecha:* ${fechaHora}\n` +
                           `📦 *Total paquetes:* ${fotosArray.length}\n` +
                           `🆔 *Guías:* ${ids}\n` +
                           `━━━━━━━━━━━━━━━━━━\n\n` +
                           `📸 Las imágenes están guardadas en nuestro sistema.`;
            
            window.open(`https://wa.me/${telefonoCompleto}?text=${encodeURIComponent(mensaje)}`, '_blank');
            
            // Mostrar resultado
            mostrarEstado(`✅ PROCESO COMPLETADO: ${enviadas} enviados, ${errores} errores`, 'success');
            
            // Limpiar fotos (pero mantener teléfono para siguientes paquetes del mismo cliente)
            setTimeout(() => {
                fotosArray = [];
                actualizarPreview();
                btnFinalizar.disabled = false;
                btnFinalizar.textContent = '📲 FINALIZAR Y ENVIAR';
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 3000);
        }
        
        // Enviar a Telegram
        async function enviarATelegram(foto, idGuia, telefono, fechaHora) {
            const formData = new FormData();
            formData.append('chat_id', CONFIG.TELEGRAM_GRUPO_ID);
            formData.append('photo', foto);
            
            const caption = `📦 *NUEVA CAPTURA*\n` +
                          `━━━━━━━━━━━━━━\n` +
                          `🆔 *ID:* ${idGuia}\n` +
                          `📞 *Teléfono:* ${telefono}\n` +
                          `📅 *Fecha:* ${fechaHora}\n` +
                          `━━━━━━━━━━━━━━`;
            
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');
            
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (!data.ok) {
                throw new Error(data.description);
            }
        }
        
        // Mostrar estado
        function mostrarEstado(mensaje, tipo) {
            estadoDiv.textContent = mensaje;
            estadoDiv.className = `estado ${tipo}`;
            
            setTimeout(() => {
                estadoDiv.style.display = 'none';
            }, 5000);
        }
        
        // Validar teléfono
        telefonoInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });
        
        // Recuperar teléfono guardado al cargar
        window.addEventListener('load', function() {
            const telefonoGuardado = localStorage.getItem('ultimoTelefono');
            if (telefonoGuardado) {
                telefonoInput.value = telefonoGuardado;
                telefonoGuardadoMsg.textContent = `📌 Usando teléfono: ${telefonoGuardado}`;
                telefonoGuardadoMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
