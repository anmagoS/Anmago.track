    <div class="main-container">

            <div class="form-group">
                <label>📞 Teléfono del Remitente (10 dígitos)</label>
                <input type="tel" id="telefonoRemitente" placeholder="Ej: 3001234567" maxlength="10" inputmode="numeric">

            <div class="stats">
                <span>📸 Fotos: <span id="totalFotos">0</span></span>

                <button onclick="finalizarEnvio()" class="btn-enviar" id="btnFinalizar">
                    📲 FINALIZAR Y ENVIAR
                </button>
                <button onclick="limpiarTodo()" class="btn-limpiar" id="btnLimpiar">
                    🗑️ LIMPIAR TODO
                </button>

    <script>
        const CONFIG = {
            TELEGRAM_BOT_TOKEN: '8320682242:AAG4h89_8WVmljeEvYHjzRxmnJDt-HoxcAY',
            TELEGRAM_GRUPO_ID: '-1003710352002',
            PREFIJO_ID: 'ENV',
            // IMPORTANTE: Reemplaza con TU URL de Google Apps Script
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbz_y8kiJPEe9CyUGsQHNbRPpWnZw3SSfDPjOazkwk2nx4nYwG3_yF0AhywfkV8C3aPD/exec'
        };
        
        // Array para almacenar las fotos
        let fotosArray = [];
        
        // Elementos DOM
        const telefonoInput = document.getElementById('telefonoRemitente');
        const fotosInput = document.getElementById('fotos');
        const previewContainer = document.getElementById('previewContainer');
        const totalFotosSpan = document.getElementById('totalFotos');
        const ultimoIDSpan = document.getElementById('ultimoID');
        const btnFinalizar = document.getElementById('btnFinalizar');
        const estadoDiv = document.getElementById('estado');
        const telefonoGuardadoMsg = document.getElementById('telefonoGuardadoMsg');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        // ============================================
        // FUNCIÓN: Pre-registrar guía en el sistema (MÍNIMO)
        // ============================================
        async function preRegistrarGuia(envioId, telefono, messageId) {
            try {
                // Crear FormData con SOLO los datos mínimos
                const formData = new FormData();
                formData.append('action', 'preregistro');
                formData.append('envioId', envioId);
                formData.append('telefono', telefono);           // Esto irá a columna D
                formData.append('estado', 'CAPTURADO');
                
                // Guardar el link de Telegram en la columna Z
                const telegramLink = `https://t.me/c/${CONFIG.TELEGRAM_GRUPO_ID.replace('-100', '')}/${messageId}`;
                formData.append('telegramLink', telegramLink);
                
                // Enviar al servidor
                const response = await fetch(CONFIG.SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                console.log(`✅ Guía pre-registrada: ${envioId} con teléfono ${telefono}`);
                return true;
            } catch (error) {
                console.error('Error pre-registrando guía:', error);
                return false;
            }
        }
        
        // Generar ID único
        function generarID() {
            const fecha = new Date();
            
            // Ajustar a hora Colombia
            const options = { timeZone: 'America/Bogota' };
            const fechaCol = new Date(fecha.toLocaleString('en-US', options));
            
            const año = fechaCol.getFullYear().toString().slice(-2);
            const mes = (fechaCol.getMonth() + 1).toString().padStart(2, '0');
            const dia = fechaCol.getDate().toString().padStart(2, '0');
            const hora = fechaCol.getHours().toString().padStart(2, '0');
            const minuto = fechaCol.getMinutes().toString().padStart(2, '0');
            const segundo = fechaCol.getSeconds().toString().padStart(2, '0');
            const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            
            return `${CONFIG.PREFIJO_ID}${año}${mes}${dia}${hora}${minuto}${segundo}${random}`;
        }
        
        // Obtener fecha formateada
        function obtenerFechaHoraColombia() {
            const fecha = new Date();
            
            const opciones = {
                timeZone: 'America/Bogota',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true,
                timeZoneName: 'short'
            };
            
            return fecha.toLocaleString('es-CO', opciones).replace(',', '');
        }
        
        // Agregar fotos
        fotosInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            
            for (const file of files) {
                const id = generarID();
                
                const reader = new FileReader();
                const imageUrl = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                
                fotosArray.push({
                    file: file,
                    id: id,
                    preview: imageUrl
                });
            }
            
            actualizarPreview();
            fotosInput.value = '';
        });
        
        // Actualizar vista previa
        function actualizarPreview() {
            previewContainer.innerHTML = '';
            
            fotosArray.forEach((foto, index) => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                
                item.innerHTML = `
                    <img src="${foto.preview}" alt="Preview">
                    <div class="id-preview">${foto.id}</div>
                    <button class="remove-btn" onclick="eliminarFoto(${index})">×</button>
                `;
                
                previewContainer.appendChild(item);
            });
            
            totalFotosSpan.textContent = fotosArray.length;
            if (fotosArray.length > 0) {
                ultimoIDSpan.textContent = fotosArray[fotosArray.length - 1].id;
            } else {
                ultimoIDSpan.textContent = '-';
            }
        }
        
        // Eliminar foto
        function eliminarFoto(index) {
            fotosArray.splice(index, 1);
            actualizarPreview();
        }
        
        // Limpiar TODO
        function limpiarTodo() {
            if (fotosArray.length > 0 && !confirm('¿Eliminar todas las fotos y limpiar el teléfono?')) {
                return;
            }
            
            fotosArray = [];
            telefonoInput.value = '';
            localStorage.removeItem('ultimoTelefono');
            telefonoGuardadoMsg.style.display = 'none';
            actualizarPreview();
            mostrarEstado('🧹 Todo limpiado: fotos y teléfono', 'success');
        }
        
        // Función principal - FINALIZAR Y ENVIAR
        async function finalizarEnvio() {
            // Validaciones
            const telefono = telefonoInput.value.trim();
            
            if (!telefono) {
                mostrarEstado('⚠️ Ingresa el teléfono del remitente', 'error');
                return;
            }
            
            if (!/^\d{10}$/.test(telefono)) {
                mostrarEstado('⚠️ Teléfono debe tener 10 dígitos', 'error');
                return;
            }
            
            if (fotosArray.length === 0) {
                mostrarEstado('⚠️ No hay fotos para enviar', 'error');
                return;
            }
            
            // Confirmar
            if (!confirm(`¿Finalizar envío de ${fotosArray.length} paquete(s)?`)) {
                return;
            }
            
            // Deshabilitar botón
            btnFinalizar.disabled = true;
            btnFinalizar.textContent = '⏫ PROCESANDO...';
            progressBar.style.display = 'block';
            
            // Guardar teléfono
            localStorage.setItem('ultimoTelefono', telefono);
            telefonoGuardadoMsg.textContent = `📌 Teléfono guardado: ${telefono}`;
            telefonoGuardadoMsg.style.display = 'block';
            
            const fechaHora = obtenerFechaHoraColombia();
            let enviadas = 0;
            let errores = 0;
            let preregistros = 0;
            
            // ============================================
            // PASO 1: ENVIAR CADA FOTO A TELEGRAM Y PRE-REGISTRAR
            // ============================================
            for (let i = 0; i < fotosArray.length; i++) {
                const foto = fotosArray[i];
                
                // Actualizar progreso
                const progreso = ((i + 1) / fotosArray.length) * 100;
                progressFill.style.width = progreso + '%';
                
                try {
                    // Enviar a Telegram y obtener message_id
                    const messageId = await enviarATelegram(foto.file, foto.id, telefono, fechaHora);
                    
                    // PRE-REGISTRAR LA GUÍA (SOLO ID Y TELÉFONO)
                    if (messageId) {
                        await preRegistrarGuia(foto.id, telefono, messageId);
                        preregistros++;
                    }
                    
                    enviadas++;
                } catch (error) {
                    console.error('Error:', error);
                    errores++;
                }
                
                // Pequeña pausa
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            // ============================================
            // PASO 2: ENVIAR WHATSAPP
            // ============================================
            const ids = fotosArray.map(f => f.id).join(', ');
            const telefonoCompleto = '57' + telefono;

            const mensaje = `📦 *ENVÍOS REGISTRADOS*\n` +
                           `━━━━━━━━━━━━━━━━━━\n` +
                           `📞 *Remitente:* ${telefono}\n` +
                           `📅 *Fecha:* ${fechaHora}\n` +
                           `📦 *Total paquetes:* ${fotosArray.length}\n` +
                           `🆔 *Guías:* ${ids}\n` +
                           `━━━━━━━━━━━━━━━━━━\n\n` +
                           `📸 Las imágenes están guardadas en nuestro sistema.`;

            // Abrir WhatsApp
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            if (isMobile) {
                window.location.href = `whatsapp://send?phone=${telefonoCompleto}&text=${encodeURIComponent(mensaje)}`;
                setTimeout(() => {
                    window.open(`https://wa.me/${telefonoCompleto}?text=${encodeURIComponent(mensaje)}`, '_blank');
                }, 1000);
            } else {
                window.open(`https://wa.me/${telefonoCompleto}?text=${encodeURIComponent(mensaje)}`, '_blank');
            }
            
            // Mostrar resultado
            mostrarEstado(`✅ PROCESO COMPLETADO: ${enviadas} enviados, ${preregistros} pre-registrados, ${errores} errores`, 'success');
            
            // Limpiar fotos
            setTimeout(() => {
                fotosArray = [];
                actualizarPreview();
                btnFinalizar.disabled = false;
                btnFinalizar.textContent = '📲 FINALIZAR Y ENVIAR';
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 3000);
        }
        
        // Enviar a Telegram (modificado para devolver message_id)
        async function enviarATelegram(foto, idGuia, telefono, fechaHora) {
            const formData = new FormData();
            formData.append('chat_id', CONFIG.TELEGRAM_GRUPO_ID);
            formData.append('photo', foto);
            
            const caption = `📦 *NUEVA CAPTURA*\n` +
                          `━━━━━━━━━━━━━━\n` +
                          `🆔 *ID:* ${idGuia}\n` +
                          `📞 *Remitente:* ${telefono}\n` +
                          `📅 *Fecha:* ${fechaHora}\n` +
                          `━━━━━━━━━━━━━━`;
            
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');
            
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (!data.ok) {
                throw new Error(data.description);
            }
            
            return data.result.message_id;
        }
        
        // Mostrar estado
        function mostrarEstado(mensaje, tipo) {
            estadoDiv.textContent = mensaje;
            estadoDiv.className = `estado ${tipo}`;
            
            setTimeout(() => {
                estadoDiv.style.display = 'none';
            }, 5000);
        }
        
        // Validar teléfono
        telefonoInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });
        
        // Recuperar teléfono guardado
        window.addEventListener('load', function() {
            const telefonoGuardado = localStorage.getItem('ultimoTelefono');
            if (telefonoGuardado) {
                telefonoInput.value = telefonoGuardado;
                telefonoGuardadoMsg.textContent = `📌 Usando teléfono: ${telefonoGuardado}`;
                telefonoGuardadoMsg.style.display = 'block';
            }
        });

        // Función para logout (ejemplo)
        document.getElementById('logoutButton')?.addEventListener('click', function() {
            if (confirm('¿Cerrar sesión?')) {
                localStorage.clear();
                location.reload();
            }
        });
    </script>
</body>
</html>
