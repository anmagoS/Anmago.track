<!DOCTYPE html>
<html>
<head>
    <title>📸 Captura Rótulo - Mensajeros</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
        }
        
        input[type="tel"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="tel"]:focus {
            border-color: #0088cc;
            outline: none;
        }
        
        .file-input {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .file-input:hover {
            border-color: #0088cc;
        }
        
        .preview {
            margin-top: 10px;
            text-align: center;
        }
        
        .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            display: none;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #006699;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .estado {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .estado.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .estado.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .id-generado {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            color: #0088cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 Capturar Rótulo</h2>
        
        <div class="id-generado" id="idGenerado">
            Generando ID...
        </div>
        
        <div class="form-group">
            <label>📞 Teléfono del Cliente (10 dígitos)</label>
            <input type="tel" id="telefonoCliente" placeholder="Ej: 3001234567" maxlength="10" inputmode="numeric">
            <small style="color: #666;">Solo 10 dígitos, sin 57 ni espacios</small>
        </div>
        
        <div class="form-group">
            <label>📸 Foto del Rótulo</label>
            <div class="file-input" onclick="document.getElementById('foto').click()">
                <span>Haz clic para tomar foto</span>
                <input type="file" id="foto" accept="image/*" capture="environment" style="display: none;">
            </div>
            <div class="preview">
                <img id="preview" src="#" alt="Vista previa">
            </div>
        </div>
        
        <button onclick="enviarCaptura()" id="btnEnviar">📤 Enviar y Notificar</button>
        
        <div id="estado" class="estado"></div>
    </div>

    <script>
        // Configuración - ¡CAMBIA ESTOS VALORES!
        const CONFIG = {
            TELEGRAM_BOT_TOKEN: '8320682242:AAG4h89_8WVmljeEvYHjzRxmnJDt-HoxcAY',
            TELEGRAM_GRUPO_ID: '-1003710352002',
            PREFIJO_ID: 'ENV'
        };
        
        // Elementos del DOM
        const telefonoInput = document.getElementById('telefonoCliente');
        const fotoInput = document.getElementById('foto');
        const previewImg = document.getElementById('preview');
        const idGeneradoDiv = document.getElementById('idGenerado');
        const btnEnviar = document.getElementById('btnEnviar');
        const estadoDiv = document.getElementById('estado');
        
        // Vista previa de la foto
        fotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
       // Generar ID único usando hora Colombia (SIN ajuste manual)
function generarID() {
    const fecha = new Date();
    
    // Obtener partes de la fecha en hora Colombia
    const formatter = new Intl.DateTimeFormat('es-CO', {
        timeZone: 'America/Bogota',
        year: '2-digit',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
    
    const partes = formatter.formatToParts(fecha);
    
    // Extraer valores
    let año, mes, dia, hora, minuto, segundo;
    
    partes.forEach(part => {
        if (part.type === 'year') año = part.value;
        if (part.type === 'month') mes = part.value;
        if (part.type === 'day') dia = part.value;
        if (part.type === 'hour') hora = part.value;
        if (part.type === 'minute') minuto = part.value;
        if (part.type === 'second') segundo = part.value;
    });
    
    const id = `${CONFIG.PREFIJO_ID}${año}${mes}${dia}${hora}${minuto}${segundo}`;
    
    idGeneradoDiv.textContent = `🆔 ID: ${id}`;
    return id;
}
        
        // Obtener fecha y hora formateada para Colombia
        function obtenerFechaHoraColombia() {
            const fecha = new Date();
            
            
            const opciones = {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
               
            };
            
            return fecha.toLocaleString('es-CO', opciones).replace(',', '');
        }
        
        // Generar ID al cargar la página
        window.addEventListener('load', generarID);
        
        // Función principal
        async function enviarCaptura() {
            // Validar campos
            const telefono = telefonoInput.value.trim();
            const foto = fotoInput.files[0];
            const idGuia = generarID();
            const fechaHora = obtenerFechaHoraColombia();
            
            if (!telefono) {
                mostrarEstado('⚠️ Ingresa el teléfono del cliente', 'error');
                return;
            }
            
            if (!foto) {
                mostrarEstado('⚠️ Toma la foto del rótulo', 'error');
                return;
            }
            
            // Validar que sean exactamente 10 dígitos numéricos
            if (!/^\d{10}$/.test(telefono)) {
                mostrarEstado('⚠️ El teléfono debe tener 10 dígitos (Ej: 3001234567)', 'error');
                return;
            }
            
            // Deshabilitar botón
            btnEnviar.disabled = true;
            btnEnviar.textContent = '⏫ Procesando...';
            mostrarEstado('📤 Enviando copia a Telegram...', 'success');
            
            try {
                // ============================================
                // ACCIÓN 1: ENVIAR A TELEGRAM (TU COPIA)
                // ============================================
                await enviarATelegram(foto, idGuia, telefono, fechaHora);
                
                // ============================================
                // ACCIÓN 2: COMPARTIR IMAGEN CON TEXTO (ABRE EXPLORADOR DE APPS)
                // ============================================
                await compartirImagenConTexto(foto, idGuia, fechaHora);
                
                mostrarEstado('✅ ¡Listo! Imagen guardada en Telegram y lista para compartir', 'success');
                
                // Limpiar formulario
                setTimeout(() => {
                    telefonoInput.value = '';
                    fotoInput.value = '';
                    previewImg.style.display = 'none';
                    generarID();
                    btnEnviar.disabled = false;
                    btnEnviar.textContent = '📤 Enviar y Notificar';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                mostrarEstado(`❌ Error: ${error.message}`, 'error');
                btnEnviar.disabled = false;
                btnEnviar.textContent = '📤 Enviar y Notificar';
            }
        }
        
        // ============================================
        // FUNCIÓN 1: ENVIAR A TELEGRAM
        // ============================================
        async function enviarATelegram(foto, idGuia, telefono, fechaHora) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = async function(e) {
                    try {
                        const formData = new FormData();
                        formData.append('chat_id', CONFIG.TELEGRAM_GRUPO_ID);
                        formData.append('photo', foto);
                        
                        const caption = `📦 *NUEVA CAPTURA*\n` +
                                      `━━━━━━━━━━━━━━\n` +
                                      `🆔 *ID:* ${idGuia}\n` +
                                      `📞 *Teléfono:* ${telefono}\n` +
                                      `📅 *Fecha:* ${fechaHora}\n` +
                                      `━━━━━━━━━━━━━━`;
                        
                        formData.append('caption', caption);
                        formData.append('parse_mode', 'Markdown');
                        
                        const response = await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await response.json();
                        
                        if (data.ok) {
                            console.log('✅ Imagen guardada en Telegram');
                            resolve(true);
                        } else {
                            console.warn('⚠️ Error en Telegram:', data.description);
                            resolve(false);
                        }
                        
                    } catch (error) {
                        console.warn('⚠️ Error enviando a Telegram:', error);
                        resolve(false);
                    }
                };
                
                reader.onerror = () => {
                    console.warn('⚠️ Error leyendo imagen para Telegram');
                    resolve(false);
                };
                
                reader.readAsDataURL(foto);
            });
        }
        
        // ============================================
        // FUNCIÓN 2: COMPARTIR IMAGEN CON TEXTO (ABRE EXPLORADOR DE APPS)
        // ============================================
        async function compartirImagenConTexto(foto, idGuia, fechaHora) {
            try {
                // Crear archivo para compartir
                const file = new File([foto], `guia-${idGuia}.jpg`, {
                    type: foto.type || 'image/jpeg'
                });
                
                // Texto para compartir
                const textoCompartir = `📦 Guía: ${idGuia}\n📅 Fecha: ${fechaHora}`;
                
                // Verificar si el navegador soporta Web Share
                if (navigator.canShare && navigator.share) {
                    const shareData = {
                        title: `Guía ${idGuia}`,
                        text: textoCompartir,
                        files: [file]
                    };
                    
                    // Verificar si podemos compartir la imagen
                    if (navigator.canShare(shareData)) {
                        await navigator.share(shareData);
                        console.log('✅ Imagen compartida exitosamente');
                        return true;
                    }
                }
                
                // Si no soporta Web Share, mostrar mensaje
                alert('Selecciona WhatsApp en el explorador de apps para enviar la imagen');
                
                // Intentar con método alternativo (solo texto)
                const telefonoCompleto = '57' + telefonoInput.value.trim();
                const mensaje = `📦 Guía: ${idGuia}\n📅 Fecha: ${fechaHora}\n\nPor favor adjunta la imagen manualmente`;
                window.open(`https://wa.me/${telefonoCompleto}?text=${encodeURIComponent(mensaje)}`, '_blank');
                
                return false;
                
            } catch (error) {
                console.warn('⚠️ Error al compartir:', error);
                
                // Si el usuario cancela, no es error
                if (error.name === 'AbortError' || error.message.includes('cancel')) {
                    console.log('👆 El usuario canceló el compartir');
                    return false;
                }
                
                throw error;
            }
        }
        
        // Función para mostrar estado
        function mostrarEstado(mensaje, tipo) {
            estadoDiv.textContent = mensaje;
            estadoDiv.className = `estado ${tipo}`;
        }
        
        // Permitir solo números en el teléfono
        telefonoInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });
        
        // Permitir enter en el input
        telefonoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enviarCaptura();
            }
        });
    </script>
</body>
</html>
